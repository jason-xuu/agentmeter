<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentmeter · AI CLI dashboard</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#14171c; --panel2:#1a1e24; --line:#252b33;
    --fg:#e6e9ef; --dim:#8b95a4; --faint:#5b6472;
    --ok:#3fb950; --bad:#f85149; --warn:#d29922; --info:#58a6ff; --accent:#a371f7;
    --codex:#2dd4bf;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f7f9; --panel:#fff; --panel2:#f0f2f5; --line:#dfe3e8;
           --fg:#1c2128; --dim:#57606a; --faint:#8c959f; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:14px/1.5 ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
    padding:28px 22px 60px}
  .wrap{max-width:1080px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  h1{font-size:17px;margin:0;letter-spacing:.3px;font-weight:600}
  h1 .tag{color:var(--faint);font-weight:400}
  .live{display:flex;align-items:center;gap:6px;color:var(--dim);font-size:12px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 0 0 rgba(63,185,80,.6);animation:p 2s infinite}
  .dot.stale{background:var(--warn);animation:none}
  .dot.dead{background:var(--bad);animation:none}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 7px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:15px 17px}
  .card .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.7px}
  .card .v{font-size:25px;font-weight:600;margin-top:7px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .card .s{color:var(--faint);font-size:11.5px;margin-top:5px}
  .v.ok{color:var(--ok)} .v.warnc{color:var(--warn)}
  .flash{animation:fl .6s ease-out}
  @keyframes fl{0%{color:var(--info)}100%{}}

  .alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
  .alert{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.35);
    border-left:3px solid var(--bad);border-radius:7px;padding:10px 13px;font-size:12.5px}
  .alert.w{background:rgba(210,153,34,.08);border-color:rgba(210,153,34,.35);border-left-color:var(--warn)}
  .alert b{color:var(--fg)} .alert .fix{color:var(--dim);display:block;margin-top:4px}
  code{background:var(--panel2);padding:1.5px 5px;border-radius:4px;font-size:11.5px;color:var(--info)}

  .sect{display:flex;align-items:baseline;gap:10px;margin:22px 2px 9px}
  .sect h2{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);font-weight:600;margin:0}
  .sect .c{color:var(--faint);font-size:11.5px}

  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;overflow:hidden}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;
    color:var(--dim);font-weight:500;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel2)}
  td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:0}
  th.n,td.n{text-align:right;font-variant-numeric:tabular-nums}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2.5px 8px;
    border-radius:20px;white-space:nowrap;font-weight:500}
  .pill.up{background:rgba(63,185,80,.13);color:var(--ok)}
  .pill.down{background:rgba(248,81,73,.13);color:var(--bad)}
  .pill.idle{background:var(--panel2);color:var(--faint)}
  .pname{font-weight:600}
  .pkind{color:var(--faint);font-size:11px;margin-top:2px}
  .pdetail{color:var(--dim);font-size:11.5px;margin-top:6px;max-width:44ch}
  .nm{color:var(--faint);font-style:italic;font-size:11.5px}
  .neg{color:var(--warn)}
  .saved{color:var(--ok);font-weight:600}
  .note{color:var(--faint);font-size:11px;margin-top:4px;max-width:34ch;line-height:1.45}

  .clibadge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.4px;
    padding:2px 7px;border-radius:5px;text-transform:lowercase}
  .clibadge.claude{background:rgba(163,113,247,.15);color:var(--accent)}
  .clibadge.codex{background:rgba(45,212,191,.15);color:var(--codex)}
  .clis{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}

  .bar{height:3px;background:var(--panel2);border-radius:2px;margin-top:7px;overflow:hidden;max-width:150px;margin-left:auto}
  .bar>i{display:block;height:100%;background:var(--ok);border-radius:2px}

  footer{margin-top:20px;color:var(--faint);font-size:11.5px;line-height:1.7}
  footer b{color:var(--dim);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>agentmeter <span class="tag">· Claude Code + Codex</span></h1>
    <div class="live"><span class="dot" id="dot"></span><span id="livetxt">connecting…</span></div>
  </header>

  <div class="cards" id="cards"></div>
  <div class="alerts" id="alerts"></div>

  <div class="sect"><h2>Live sessions</h2><span class="c" id="sesscount"></span></div>
  <table>
    <thead>
      <tr>
        <th>CLI</th><th>Session</th>
        <th class="n">Total tokens</th>
        <th class="n">Today</th>
        <th class="n">Output</th>
        <th class="n">Cache read</th>
        <th>Last active</th>
      </tr>
    </thead>
    <tbody id="sessions"></tbody>
  </table>

  <div class="sect"><h2>Plugins &amp; extensions</h2><span class="c" id="plugcount"></span></div>
  <table>
    <thead>
      <tr>
        <th>Plugin</th><th>Status</th>
        <th class="n">Tokens / session</th>
        <th class="n">Tokens saved</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer id="foot"></footer>
</div>

<script>
const fmt = n => n==null ? '—' : Math.abs(n)>=1e6 ? (n/1e6).toFixed(1)+'M'
  : Math.abs(n)>=1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
const usd = n => n==null ? '—' : '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const rel = ts => { const s=Math.max(0,Math.round((Date.now()-ts)/1000));
  return s<60?s+'s ago':s<3600?Math.floor(s/60)+'m ago':s<86400?Math.floor(s/3600)+'h ago':Math.floor(s/86400)+'d ago'; };
const clis = arr => (arr||[]).map(c=>`<span class="clibadge ${c}">${c}</span>`).join('');

let prevToday = null;
function render(d){
  if(d.error){ document.getElementById('livetxt').textContent='error: '+d.error; return; }
  const t=d.totals, sp=d.spend, sess=d.sessions||[];

  const flash = (sp.todayTotal!==prevToday && prevToday!==null) ? ' flash' : '';
  prevToday = sp.todayTotal;

  // Totals. "Tokens saved" counts ONLY plugins that actually measure it.
  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="k">Total tokens saved</div>
      <div class="v ok">${fmt(t.savedTokens)}</div>
      <div class="s">${usd(t.savedCost)} avoided · from ${t.measuredCount} of ${t.measuredCount+t.unmeasuredCount} plugins</div>
    </div>
    <div class="card">
      <div class="k">Tokens used today</div>
      <div class="v${flash}">${fmt(sp.todayTotal)}</div>
      <div class="s">claude ${fmt(sp.claudeTodayTotal)} · codex ${fmt(sp.codexTodayTotal)}</div>
    </div>
    <div class="card">
      <div class="k">Live sessions</div>
      <div class="v">${d.activeSessions}<span style="color:var(--faint);font-size:16px">/${sess.length}</span></div>
      <div class="s">active now · across Claude Code + Codex</div>
    </div>
    <div class="card">
      <div class="k">Always-on context cost</div>
      <div class="v warnc">${fmt(t.alwaysOnTokens)}</div>
      <div class="s">added to every session, before you type</div>
    </div>
    <div class="card">
      <div class="k">Plugins active</div>
      <div class="v">${d.plugins.filter(p=>p.active).length}<span style="color:var(--faint);font-size:16px">/${d.plugins.length}</span></div>
      <div class="s">${esc(d.plugins.filter(p=>!p.active).map(p=>p.name).join(', ')||'all healthy')}</div>
    </div>`;

  // Alerts: anything registered but not actually doing its job.
  const alerts=[];
  for(const p of d.plugins){
    if(p.active) continue;
    if(p.id==='rtk') alerts.push({sev:'bad',msg:`<b>rtk hook is broken.</b> The binary exists at <code>~/.headroom/bin/rtk</code> but does not resolve on the hook's PATH, so <code>rtk hook claude</code> fails silently on every Bash call — it has saved nothing.`,fix:`Fix: symlink it onto PATH — <code>ln -s ~/.headroom/bin/rtk /usr/local/bin/rtk</code>`});
    else if(p.id==='headroom') alerts.push({sev:'bad',msg:`<b>headroom is not compressing.</b> Its MCP tools work, but the proxy is down and Claude Code is not routed through it — current savings are zero. The ${fmt(p.savedTokens)} below is lifetime history.`,fix:`Fix: <code>headroom proxy</code> then <code>headroom wrap claude</code>`});
    else alerts.push({sev:'bad',msg:`<b>${esc(p.name)} is down.</b> ${esc(p.detail)}`,fix:''});
  }
  if(t.unmeasuredCount) alerts.push({sev:'w',
    msg:`<b>${t.unmeasuredCount} plugins report no token savings data:</b> ${esc(t.unmeasured.join(', '))}.`,
    fix:`These expose no savings ledger, so they are shown as "not measured" rather than zero. The total above deliberately excludes them — it is not an estimate.`});
  document.getElementById('alerts').innerHTML = alerts.map(a=>
    `<div class="alert ${a.sev==='w'?'w':''}">${a.msg}${a.fix?`<span class="fix">${a.fix}</span>`:''}</div>`).join('');

  // Live sessions — one row per active/recent session, per CLI, updating live.
  document.getElementById('sesscount').textContent =
    `${d.activeSessions} active · ${sess.length} within 6h · cumulative today ${fmt(sp.todayTotal)}`;
  document.getElementById('sessions').innerHTML = sess.length ? sess.map(s=>`
    <tr>
      <td><span class="clibadge ${esc(s.cli)}">${esc(s.cli)}</span></td>
      <td><div class="pname">${esc(s.label)}</div><div class="pkind">${esc(String(s.id).slice(0,8))}</div></td>
      <td class="n">${fmt(s.tokens.total)}</td>
      <td class="n">${s.todayTotal?fmt(s.todayTotal):'—'}</td>
      <td class="n">${fmt(s.tokens.output)}</td>
      <td class="n">${fmt(s.tokens.cacheRead)}</td>
      <td><span class="pill ${s.active?'up':'idle'}">${s.active?'● live':rel(s.lastTs)}</span></td>
    </tr>`).join('') : `<tr><td colspan="7" class="nm">no sessions active in the last 6 hours</td></tr>`;

  // Per-plugin rows.
  document.getElementById('plugcount').textContent = `${d.plugins.length} installed`;
  document.getElementById('rows').innerHTML = d.plugins.map(p=>{
    let saved;
    if(p.savedTokens==null) saved=`<span class="nm">not measured</span>`;
    else if(p.savedTokens<0) saved=`<span class="neg">${fmt(p.savedTokens)}</span><div class="note">net overhead, not savings</div>`;
    else saved=`<span class="saved">${fmt(p.savedTokens)}</span>`+
      (p.savedCost?`<div class="note">${usd(p.savedCost)} avoided</div>`:'')+
      (p.savedPct?`<div class="bar"><i style="width:${Math.min(100,p.savedPct)}%"></i></div>`:'');
    const cost = p.alwaysOnTokens!=null
      ? `<b>${p.alwaysOnTokens.toLocaleString()}</b>`
      : `<span class="nm">on demand</span>`;
    return `<tr>
      <td><div class="pname">${esc(p.name)}</div><div class="pkind">${esc(p.kind)}</div>
          <div class="clis">${clis(p.clis)}</div></td>
      <td><span class="pill ${p.active?'up':'down'}">${p.active?'●':'✕'} ${esc(p.status)}</span>
          <div class="pdetail">${esc(p.detail)}</div></td>
      <td class="n">${cost}${p.tokensNote?`<div class="note">${esc(p.tokensNote)}</div>`:''}</td>
      <td class="n">${saved}</td>
    </tr>`;
  }).join('');

  document.getElementById('foot').innerHTML =
    `<b>Sources —</b> savings: <code>headroom savings --json</code>, tokensave <code>savings_ledger</code>. `+
    `Per-session cost: <code>claude plugin details</code>. Usage: Claude Code + Codex session transcripts `+
    `(${sp.sessions} recent sessions, ${fmt(sp.allTimeTotal)} tokens all-time). Health: live probes of :37701 and :8787.<br>`+
    `<b>No number on this page is estimated or inferred.</b> Per-session token counts are read directly from each CLI's own transcript; where a plugin exposes no savings ledger, it says so.`;

  const dot=document.getElementById('dot');
  dot.className='dot';
  document.getElementById('livetxt').textContent='live · '+new Date(d.ts).toLocaleTimeString();
}

let es;
function connect(){
  es = new EventSource('/events');
  es.onmessage = e => render(JSON.parse(e.data));
  es.onerror = () => {
    document.getElementById('dot').className='dot dead';
    document.getElementById('livetxt').textContent='disconnected — retrying';
  };
}
connect();
</script>
</body>
</html>
